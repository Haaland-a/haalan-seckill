spring:
  application:
    name: gateway
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:nacos}:8848
      config:
        file-extension: yaml # 文件后缀名
        shared-configs: # 共享配置
          - dataId: share-log.yaml # 共享日志配置
          - dataId: share-redis.yaml # 共享redis配置
