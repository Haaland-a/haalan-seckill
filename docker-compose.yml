version: '3.8'

services:
  gateway:
    build: ./haalan-gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  item-service:
    build: ./item-service
    container_name: item-service
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  search-service:
    build: ./search-service
    container_name: search-service
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  seckill-service:
    build: ./seckill-service
    container_name: seckill-service
    environment:
      - NACOS_HOST=nacos
    networks:
      - haalan
    restart: always

  frontend:
    build: ../haalan_
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - haalan
    depends_on:
      - gateway
    restart: always

networks:
  haalan:
    external: true